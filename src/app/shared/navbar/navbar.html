<header class="site-header">
	<nav class="navbar" aria-label="Navegacion principal">
		

		<button
			class="navbar__toggle"
			type="button"
			(click)="toggleMenu()"
			[attr.aria-expanded]="isMenuOpen()"
			aria-controls="main-menu"
			aria-label="Abrir menu principal"
		>
			<span></span>
			<span></span>
			<span></span>
		</button>

		<div id="main-menu" class="navbar__menu" [class.is-open]="isMenuOpen()">
            <a class="navbar__brand" routerLink="/home" (click)="closeMenus()" aria-label="Ir al inicio Xinergia TotalCare">
			<span class="navbar__logo" aria-hidden="true">
				<img src="logo.png" alt="Xinergia TotalCare">
			</span>
		</a>
			<ul class="navbar__links">
				<li><a routerLink="/home" routerLinkActive="is-active" (click)="closeMenus()">HOME</a></li>

				<li class="navbar__dropdown" [class.is-open]="isSpecialtiesOpen()">
					<button
						type="button"
						class="navbar__dropdown-trigger"
						(click)="toggleSpecialties($event)"
						[attr.aria-expanded]="isSpecialtiesOpen()"
						aria-controls="specialties-menu"
						aria-haspopup="true"
					>
						ESPECIALIDADES
					</button>

					<ul id="specialties-menu" class="navbar__dropdown-menu" [class.is-visible]="isSpecialtiesOpen()">
						<li>
							<a routerLink="/plans" (click)="closeMenus()">Especialidades odontologicas</a>
						</li>
						<li>
							<a routerLink="/plans" (click)="closeMenus()">Especialidades medicas</a>
						</li>
					</ul>
				</li>

				<li><a routerLink="/about" routerLinkActive="is-active" (click)="closeMenus()">ACERCA DE NOSOTROS</a></li>
				<li><a routerLink="/contact" routerLinkActive="is-active" (click)="closeMenus()">CONTACTO</a></li>
				<li><a routerLink="/plans" routerLinkActive="is-active" (click)="closeMenus()">PLANES</a></li>
			</ul>

			<a class="navbar__cta" routerLink="/contact" (click)="closeMenus()">CONTACTO</a>
		</div>
	</nav>
</header>
