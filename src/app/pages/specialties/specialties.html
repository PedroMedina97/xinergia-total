<!-- Hero Section -->
<section class="specialties-hero">
  <div class="hero-container">
    <!-- Left Content -->
    <div class="hero-content">
      <!-- Badge with Avatars -->
      <div class="specialists-badge">
        <div class="avatars">
          <img src="assets/images/doctor1.jpg" alt="Doctor 1" />
          <img src="assets/images/doctor2.jpg" alt="Doctor 2" />
          <img src="assets/images/doctor3.jpg" alt="Doctor 3" />
        </div>
        <span class="badge-text">+30 Médicos especialistas</span>
      </div>

      <!-- Main Title -->
      <h1 class="hero-title">
        Todas las especialidades<br />
        <span class="highlight-text">médicas</span> en un solo lugar.
      </h1>

      <!-- Description -->
      <p class="hero-description">
        Con Xinergia Total Care, estás protegido en todas las áreas,<br />
        desde el más pequeño, hasta el más grande.
      </p>

      <!-- Scroll Indicator -->
      <div class="scroll-indicator">
        <svg width="24" height="40" viewBox="0 0 24 40" fill="none">
          <path d="M12 5 L12 35 M12 35 L7 30 M12 35 L17 30" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Right Content - Doctor Image -->
    <div class="hero-image">
      <img src="assets/images/doctor-hero.jpg" alt="Profesional de la salud" />
      
      <!-- Floating Icons -->
      <div class="floating-icon icon-heart">
        ❤️
      </div>
      <div class="floating-icon icon-gynecology">
        🩺
      </div>
      <div class="floating-icon icon-tooth">
        🦷
      </div>
      <div class="floating-icon icon-brain">
        🧠
      </div>
      
      <!-- Specialties Counter -->
      <div class="specialties-counter">
        <div class="counter-number">20+</div>
        <div class="counter-label">Especialidades</div>
      </div>
    </div>
  </div>
</section>

<!-- Dental Specialties Section -->
<app-dental></app-dental>

<!-- Medical Specialties Section -->
<app-medical></app-medical>
