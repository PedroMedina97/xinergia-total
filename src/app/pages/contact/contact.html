<!-- Contact Section -->
<section class="contact-section">
  <div class="container">
    <div class="contact-content">
      <!-- Left Side - Form -->
      <div class="contact-form-wrapper">
        <div class="form-header">
          <p class="form-subtitle">Contáctanos</p>
          <h1 class="form-title">Queremos escucharte</h1>
        </div>

        <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
          <div class="form-row">
            <div class="form-group">
              <input
                type="text"
                id="nombre"
                formControlName="nombre"
                placeholder="Nombre"
                class="form-input"
              />
            </div>

            <div class="form-group">
              <input
                type="tel"
                id="telefono"
                formControlName="telefono"
                placeholder="Teléfono"
                class="form-input"
              />
            </div>
          </div>

          <div class="form-group">
            <input
              type="email"
              id="email"
              formControlName="email"
              placeholder="Correo electrónico"
              class="form-input"
            />
          </div>

          <div class="form-group">
            <textarea
              id="mensaje"
              formControlName="mensaje"
              placeholder="Mensaje"
              rows="6"
              class="form-input form-textarea"
            ></textarea>
          </div>

          <button type="submit" class="btn-submit" [disabled]="!contactForm.valid">
            Enviar
          </button>
        </form>
      </div>

      <!-- Right Side - Contact Info -->
      <div class="contact-info">
        <div class="info-item">
          <div class="info-icon phone-icon">📱</div>
          <div class="info-content">
            <h3 class="info-title">Número y whatsapp</h3>
            <p class="info-detail">993 178 7086</p>
            <p class="info-detail">993 147 7822</p>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon email-icon">✉️</div>
          <div class="info-content">
            <h3 class="info-title">Email</h3>
            <p class="info-detail">xinergiatotalcare@gmail.com</p>
            <p class="info-detail">xinergiadental@gmail.com</p>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon location-icon">📍</div>
          <div class="info-content">
            <h3 class="info-title">Ubicación</h3>
            <p class="info-detail">
              Torre Ankor - Medical & Business Center, Piso 4<br />
              consultorio #403, Prol. 27 de feb 3303 Tab. 200
            </p>
          </div>
        </div>

        <!-- Map -->
        <div class="map-container">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3794.0!2d-92.9!3d17.98!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTfCsDU4JzQ4LjAiTiA5MsKwNTQnMDAuMCJX!5e0!3m2!1ses!2smx!4v1234567890"
            width="100%"
            height="200"
            style="border:0;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
          <a
            href="https://maps.google.com"
            target="_blank"
            class="map-link"
          >
            Abrir en maps
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
